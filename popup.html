<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GitGlow Settings</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup-container">
    <!-- Header -->
    <div class="header">
      <div class="logo-area">
        <span class="logo-icon">✨</span>
        <h1 class="title">GitGlow</h1>
      </div>
      <p class="subtitle">Customize your contribution graph</p>
    </div>

    <!-- Theme Selection -->
    <div class="theme-selection">
      <label class="section-title">Select Color Theme</label>
      
      <div class="theme-cards">
        <!-- Colorful Theme Card -->
        <div class="theme-card" data-theme="colorful">
          <div class="card-glow colorful-glow"></div>
          <div class="card-header">
            <span class="card-icon">🌈</span>
            <div class="label-group">
              <span class="card-label">All Colorful</span>
              <span class="card-desc">Vibrant custom palette</span>
            </div>
          </div>
          <div class="color-preview">
            <span class="preview-dot color-p1"></span>
            <span class="preview-dot color-p2"></span>
            <span class="preview-dot color-p3"></span>
            <span class="preview-dot color-p4"></span>
          </div>
        </div>

        <!-- Green Theme Card -->
        <div class="theme-card" data-theme="green">
          <div class="card-glow green-glow"></div>
          <div class="card-header">
            <span class="card-icon">🌿</span>
            <div class="label-group">
              <span class="card-label">All Green</span>
              <span class="card-desc">Uniform saturated light green</span>
            </div>
          </div>
          <div class="color-preview">
            <span class="preview-dot color-g-uni"></span>
            <span class="preview-dot color-g-uni"></span>
            <span class="preview-dot color-g-uni"></span>
            <span class="preview-dot color-g-uni"></span>
          </div>
        </div>

        <!-- Default Theme Card -->
        <div class="theme-card" data-theme="default">
          <div class="card-glow default-glow"></div>
          <div class="card-header">
            <span class="card-icon">🐙</span>
            <div class="label-group">
              <span class="card-label">Default GitHub</span>
              <span class="card-desc">Classic multi-tone green</span>
            </div>
          </div>
          <div class="color-preview">
            <span class="preview-dot color-d1"></span>
            <span class="preview-dot color-d2"></span>
            <span class="preview-dot color-d3"></span>
            <span class="preview-dot color-d4"></span>
          </div>
        </div>
      </div>
    </div>

    <!-- Footer -->
    <div class="footer">
      <span>Version 1.2</span>
      <a href="https://github.com/Aldebaran38/GitGlow" target="_blank" class="github-link">
        <svg height="16" viewBox="0 0 16 16" width="16" class="github-icon">
          <path d="M8 0c4.42 0 8 3.58 8 8 0 3.54-2.29 6.53-5.47 7.59-.4.07-.55-.17-.55-.38 0-.19.01-.82.01-1.49 2.01.37 2.53-.49 2.69-.94.09-.23.48-.94.82-1.13.28-.15.68-.52.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"></path>
        </svg>
      </a>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
